<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060e1f">
  <title>Jardim Digital 🌹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- ═══════════════════════════════════════
       INTRO SCREEN
  ═══════════════════════════════════════ -->
  <section id="screen-intro" class="screen active">
    <canvas id="stars-canvas"></canvas>
    <div class="intro-content">
      <div class="intro-rose" id="intro-rose">🌹</div>
      <h1 class="intro-heading">um jardim de frases</h1>
      <p class="intro-sub">Exclusivamente teu</p>
      <button id="btn-enter" class="btn-enter">
        <span class="btn-label">entrar</span>
        <span class="btn-glyph">✦</span>
      </button>
    </div>
  </section>

  <!-- ═══════════════════════════════════════
       GARDEN SCREEN
  ═══════════════════════════════════════ -->
  <section id="screen-garden" class="screen">
    <p class="garden-hint">toca em cada flor com calma ✦</p>
    <div class="flowers-grid" id="flowers-grid" role="list"></div>
    <div class="final-wrap" id="final-wrap" aria-live="polite">
      <div class="final-card">
        <span class="final-rose-icon">🌹</span>
        <p id="final-text"></p>
      </div>
    </div>
  </section>

  <!-- COUNTER -->
  <div class="flower-counter" id="flower-counter">0 / 11</div>

  <!-- ═══════════════════════════════════════
       MODAL
  ═══════════════════════════════════════ -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-name">
    <button class="modal-backdrop" id="modal-backdrop" aria-label="Fechar"></button>
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
      <div class="modal-rose-wrap" id="modal-rose-wrap"></div>
      <p class="modal-name" id="modal-name"></p>
      <p class="modal-message" id="modal-message"></p>
    </div>
  </div>

  <!-- AUDIO -->
  <audio id="bg-audio" loop preload="none">
    <source src="music/solitude.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
